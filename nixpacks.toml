# Nixpacks configuration for Coolify deployment
# This ensures the app builds correctly with React 19

[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["npm install --legacy-peer-deps"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "npx serve dist -s -p 3000"

# -s flag enables SPA mode (redirects all routes to index.html)
# Required for React Router to work correctly
