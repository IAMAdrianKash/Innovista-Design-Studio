# Nixpacks configuration for Coolify deployment
# Configured for Next.js 15

[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["npm ci"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "npm start"

# Next.js runs on port 3000 by default
# Uses Next.js built-in production server
